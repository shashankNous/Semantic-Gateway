services:
  app:
    build: .
    container_name: llm-cache-gateway-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./app:/code/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - redis

  redis:
    image: redis:7
    container_name: llm-cache-gateway-redis
    ports:
      - "6379:6379"